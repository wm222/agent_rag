<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>RAG 测试页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      line-height: 1.6;
    }
    h1 {
      margin-bottom: 20px;
    }
    .box {
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    input, textarea, button {
      font-size: 15px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 90px;
    }
    button {
      padding: 8px 16px;
      cursor: pointer;
    }
    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    .answer {
      background: #f8f8f8;
      padding: 12px;
      border-radius: 6px;
      border-left: 4px solid #999;
      white-space: pre-wrap;
    }
    .context {
      background: #fafafa;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #eee;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>RAG 测试页面</h1>

  <div class="box">
    <h2>1. 上传文档</h2>
    <div>
      用户 ID：
      <input id="userId" value="1" />
    </div>
    <div>
      选择文件：
      <input id="fileInput" type="file" />
    </div>
    <button onclick="uploadFile()">上传并建立索引</button>

    <h3>上传结果</h3>
    <pre id="uploadResult"></pre>
  </div>

  <div class="box">
    <h2>2. 基于文档提问</h2>
    <div>
      index_id：
      <input id="indexId" style="width: 500px;" placeholder="上传成功后会自动填入" />
    </div>

    <div>
      问题：
      <textarea id="question">这个文档中说 RAG 的完整流程包括哪些步骤？</textarea>
    </div>

    <button onclick="askQuestion()">提交问题</button>

    <h3>回答</h3>
    <div id="answer" class="answer"></div>

    <h3>检索到的文档片段</h3>
    <div id="contexts"></div>

    <h3>原始返回</h3>
    <pre id="queryResult"></pre>
  </div>

  <script>
    async function uploadFile() {
      const userId = document.getElementById("userId").value;
      const fileInput = document.getElementById("fileInput");
      const resultBox = document.getElementById("uploadResult");

      if (!fileInput.files.length) {
        alert("请先选择一个文件");
        return;
      }

      const formData = new FormData();
      formData.append("user_id", userId);
      formData.append("file", fileInput.files[0]);

      resultBox.textContent = "正在上传并建立索引，请稍等...";

      try {
        const res = await fetch("/api/rag/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        resultBox.textContent = JSON.stringify(data, null, 2);

        if (data.index_id) {
          document.getElementById("indexId").value = data.index_id;
        }
      } catch (err) {
        resultBox.textContent = "上传失败：\n" + err;
      }
    }

    async function askQuestion() {
      const userId = document.getElementById("userId").value;
      const indexId = document.getElementById("indexId").value.trim();
      const question = document.getElementById("question").value.trim();

      const answerBox = document.getElementById("answer");
      const contextsBox = document.getElementById("contexts");
      const rawBox = document.getElementById("queryResult");

      if (!indexId) {
        alert("请先上传文档，或者填写 index_id");
        return;
      }

      if (!question) {
        alert("请输入问题");
        return;
      }

      answerBox.textContent = "正在检索并生成回答...";
      contextsBox.innerHTML = "";
      rawBox.textContent = "";

      try {
        const res = await fetch("/api/rag/query", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: userId,
            index_id: indexId,
            question: question,
            top_k: 3
          })
        });

        const data = await res.json();

        rawBox.textContent = JSON.stringify(data, null, 2);
        answerBox.textContent = data.answer || data.detail || "没有返回 answer 字段";

        if (data.contexts && data.contexts.length > 0) {
          contextsBox.innerHTML = data.contexts.map((c, i) => `
            <div class="context">
              <strong>片段 ${i + 1}</strong>
              <br/>
              <strong>score:</strong> ${c.score}
              <br/>
              <strong>chunk_id:</strong> ${c.chunk_id}
              <br/>
              <strong>内容:</strong>
              <div>${escapeHtml(c.content)}</div>
            </div>
          `).join("");
        } else {
          contextsBox.innerHTML = "<p>没有返回检索片段。</p>";
        }
      } catch (err) {
        answerBox.textContent = "请求失败：\n" + err;
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
